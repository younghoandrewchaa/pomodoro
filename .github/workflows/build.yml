name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.16.0 has a regression that makes electron-packager's
          # in-process Electron-zip extraction drain the event loop and exit 0
          # silently, so no distributables are produced. 24.13.0 works.
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Import macOS signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          NOTES=$(git log -1 --format=%B)

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "$NOTES"
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "$NOTES"
          fi

      - name: Preflight DMG mounts
        run: |
          echo "Mounted disk images before build:"
          hdiutil info || true

          for volume in "/Volumes/pomodoro" "/Volumes/Pomodoro Installer"; do
            if [ -d "$volume" ]; then
              echo "Detaching stale DMG mount: $volume"
              hdiutil detach "$volume" || hdiutil detach -force "$volume" || true
            fi
          done

      - name: Build, sign, notarise, and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-forge publish

      - name: Verify distributables were produced
        run: |
          # Guards against a silently-empty build (e.g. the Node 24.16.0
          # extraction regression) reporting success without any artifacts.
          test -d out/make || { echo "out/make missing — packaging produced nothing"; exit 1; }
          if ! find out/make -type f \( -name '*.dmg' -o -name '*.zip' \) | grep -q .; then
            echo "No .dmg or .zip distributables were produced"
            find out/make -type f
            exit 1
          fi
          echo "Distributables produced:"
          find out/make -type f \( -name '*.dmg' -o -name '*.zip' \)

      - name: Cleanup macOS keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain-db || true
