name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Import macOS signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          NOTES=$(git log -1 --format=%B)

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "$NOTES"
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "$NOTES"
          fi

      - name: Build, sign, notarise, and make
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: 'electron-*,@electron/*,electron-forge:*'
        run: |
          echo "=== signing identities visible to the build ==="
          security find-identity -v -p codesigning || true
          echo "=== running make ==="
          npx electron-forge make
          echo "=== make exit code: $? ==="

      - name: Inspect build output
        if: always()
        run: |
          echo "=== out/ tree ==="
          find out -maxdepth 3 -type d 2>/dev/null || echo "no out dir"
          echo "=== out/make files ==="
          find out/make -type f 2>/dev/null || echo "no out/make"

      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          ARTIFACTS=()

          while IFS= read -r -d '' artifact; do
            ARTIFACTS+=("$artifact")
          done < <(find out/make -type f \( -name '*.dmg' -o -name '*.zip' \) -print0)

          if [ "${#ARTIFACTS[@]}" -eq 0 ]; then
            echo "No .dmg or .zip artifacts found under out/make"
            find out/make -type f
            exit 1
          fi

          gh release upload "$TAG" "${ARTIFACTS[@]}" --clobber

      - name: Cleanup macOS keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain-db || true
